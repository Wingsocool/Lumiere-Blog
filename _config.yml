# Hexo Configuration
# Docs: https://hexo.io/docs/configuration.html

# Site
title: 光明在前
subtitle: Aurelia's Blog
description: There is no spoon.
keywords:
author: Aurelia
language: zh-CN
timezone: Europe/Belgrade

# URL
url: https://lumiere.press
root: /
permalink: posts/:abbrlink/
permalink_defaults:

pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :year-:month-:title.md
default_layout: post
auto_spacing: true
titlecase: false

external_link:
  enable: true
  field: site
  exclude: ''

filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true

# Code Highlight
highlight:
  enable: true
  line_number: true
  auto_detect: true
  tab_replace: ''
  wrap: true
  hljs: false

prismjs:
  enable: false
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page
index_generator:
  path: ''
  per_page: 5
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata
meta_generator: false

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: mtime

# Pagination
per_page: 5
pagination_dir: page

# Include / Exclude file(s)
include:
exclude:
ignore:

# Theme
theme: next

# Search
search:
  path: search.xml
  field: post
  format: html
  limit: 10000

# Feed Atom
feed:
  type: atom
  path: atom.xml
  limit: 20

# Sitemap
sitemap:
  path: sitemap.xml

baidusitemap:
  path: baidusitemap.xml

# Local server
server:
  port: 4000
  compress: true
  header: true

# Hexo tag cloud plugin
tag_cloud:
  textFont: Trebuchet MS, Helvetica
  textColor: '#e1e1e0'
  textHeight: 25
  outlineColor: '#696969'
  maxSpeed: 0.05
  pauseOnSelected: true

# Hide posts
hide_posts:
  enable: true
  filter: hidden
  public_generators: []
  noindex: true

# Abbrlink
abbrlink:
  alg: crc32
  rep: hex
  drafts: false
  auto_category:
    enable: true
    depth:
    over_write: false
  auto_title: false
  auto_date: false
  force: false

# Deployment
# If you deploy with GitHub Actions, keep this section disabled.
# deploy:
#   type: git
#   repository:
#   branch: